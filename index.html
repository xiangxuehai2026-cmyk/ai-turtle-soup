<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI海龟汤 · 神秘推理游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f2a 0%, #0c112e 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #eef5ff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 15% 30%, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 75% 60%, #fffb, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90% 20%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 30% 85%, #ffe6b3, rgba(0,0,0,0));
            background-size: 200px 200px, 300px 300px, 150px 150px, 250px 250px;
            background-repeat: no-repeat;
            opacity: 0.5;
            pointer-events: none;
            animation: starTwinkle 8s infinite alternate;
        }

        @keyframes starTwinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(20,30,60,0.4) 0%, rgba(5,10,25,0.8) 100%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .title-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .glow-title {
            font-family: 'Playfair Display', 'Cinema', Georgia, serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #e6d5a8, #c9a96e, #f9eec1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6), 0 0 30px rgba(212, 175, 55, 0.3);
            letter-spacing: 2px;
            animation: glowPulse 3s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 8px rgba(212,175,55,0.5); }
            50% { text-shadow: 0 0 25px rgba(212,175,55,0.9); }
            100% { text-shadow: 0 0 8px rgba(212,175,55,0.5); }
        }

        .title-icon {
            font-size: 2.2rem;
            display: inline-block;
            margin-right: 12px;
            vertical-align: middle;
        }

        .hall {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(6px);
            border-radius: 2rem;
            padding: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.2rem;
        }

        .card {
            background: linear-gradient(145deg, #11172f, #0a0f24);
            border-radius: 1.5rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.6);
            border-color: #d4af37;
        }

        .card h3 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            background: #1e2a4a;
            margin-right: 0.5rem;
        }

        .difficulty-easy { background: #2c5a2c; color: #b3ffb3; }
        .difficulty-medium { background: #b86f1f; color: #ffe0b3; }
        .difficulty-hard { background: #8b2c2c; color: #ffc2c2; }

        .type-icon {
            font-size: 1.2rem;
            margin-left: 0.5rem;
        }

        .surface-preview {
            font-size: 0.85rem;
            color: #bbd4ff;
            margin-top: 0.8rem;
            line-height: 1.4;
            opacity: 0.8;
        }

        .game-panel {
            background: rgba(8, 14, 30, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 1px solid #d4af37;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        .surface-area {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-bottom: 2px solid #d4af37;
            text-align: center;
        }

        .surface-label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #d4af37;
            text-transform: uppercase;
        }

        .surface-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin-top: 0.5rem;
            line-height: 1.5;
        }

        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .user-message {
            align-self: flex-end;
            background: #1e3a5f;
            border-bottom-right-radius: 4px;
            color: white;
        }

        .assistant-message {
            align-self: flex-start;
            background: #2a2442;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #d4af37;
        }

        .input-area {
            display: flex;
            padding: 1rem;
            background: #0b1126;
            gap: 12px;
            border-top: 1px solid #2a345a;
        }

        .input-area input {
            flex: 1;
            background: #111a2e;
            border: 1px solid #2f3b6b;
            border-radius: 40px;
            padding: 12px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        button {
            background: #1f2a4e;
            border: none;
            padding: 0 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #f2e8c9;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            transform: scale(1.02);
            background: #2c3a6e;
            box-shadow: 0 0 8px rgba(212,175,55,0.5);
        }

        .btn-gold {
            background: #b8860b;
            color: #0a0f2a;
            font-weight: bold;
        }

        .btn-red {
            background: #8b2c2c;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            padding: 0 1rem 1rem 1rem;
            flex-wrap: wrap;
        }

        .endgame-reveal {
            background: #000000aa;
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 1rem;
            text-align: center;
            animation: fadeInUp 0.4s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .hidden {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.6;
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .chat-area { height: 320px; }
            button { padding: 8px 16px; }
            .action-buttons button { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title-section">
        <h1 class="glow-title">
            <span class="title-icon">🐢</span> AI海龟汤 <span class="title-icon">🌊</span>
        </h1>
        <p style="font-style: italic; letter-spacing: 1px;">迷雾推理 · 真相仅在你提问之中</p>
        <!-- 静音按钮和音频元素 -->
        <div style="text-align: center; margin: 10px 0;">
            <button id="muteBtn" style="background: #1f2a4e; border-radius: 30px; padding: 6px 15px; font-size: 0.8rem;">🔊 静音</button>
        </div>
        <audio id="bgMusic" loop preload="auto">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放。
        </audio>
    </div>

    <div id="hallView" class="hall">
        <h2>📜 未解之谜</h2>
        <div id="storyList" class="story-grid"></div>
    </div>

    <div id="gameView" class="game-panel hidden">
        <div class="surface-area">
            <div class="surface-label">🐢 汤面 · 谜面</div>
            <div class="surface-text" id="surfaceText"></div>
        </div>
        <div id="chatContainer" class="chat-area"></div>
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="提出你的疑问... (AI只答「是/否/无关」)" autocomplete="off">
            <button id="sendBtn">➤ 提问</button>
        </div>
        <div class="action-buttons">
            <button id="hintBtn" class="btn-gold">💡 提示 (<span id="hintCount">3</span>)</button>
            <button id="guessBtn" class="btn-gold" style="background: #2c5a2c;">🤔 我猜到了</button>
            <button id="viewBottomBtn" class="btn-red">🔮 查看汤底</button>
            <button id="endGameBtn">🏠 结束游戏</button>
        </div>
        <div id="gameEndPanel" class="endgame-reveal hidden"></div>
    </div>
    <footer>⚡ 与AI主持人对话 · 只能回答「是」「否」「无关」</footer>
</div>

<script>
    // ---------- 故事库 ----------
    const STORIES = [
        {
            id: "story_001",
            title: "致命海龟汤",
            difficulty: "medium",
            type: "red",
            surface: "一个人在餐厅点了一碗海龟汤，喝了一口后就举枪自尽了。",
            bottom: "他曾遭遇海难，同伴骗他说给他吃的是海龟肉，后来他尝到真正的海龟汤才发现真相。",
            hints: ["他以前喝过海龟汤吗？", "他过去的经历与海难有关吗？", "他发现被骗，骗他的是最信任的人？"],
            keywords: { "海龟汤": "是", "以前喝过": "是", "海难": "是", "同伴": "是", "骗": "是", "人肉": "是", "自杀": "是", "真相": "是", "肉": "是" }
        },
        {
            id: "story_002",
            title: "雪夜的行人",
            difficulty: "easy",
            type: "clear",
            surface: "雪地里，一名男子倒在血泊中，身上没有伤口，不远处有一把撑开的黑伞。",
            bottom: "男子从高楼上跳下自杀，坠落时撞破了积雪覆盖的遮阳伞，血是内脏破裂导致，伞是随他一同掉落的。",
            hints: ["他是自杀还是他杀？", "伞本来在何处？", "血迹与伞有关吗？"],
            keywords: { "自杀": "是", "跳楼": "是", "高处": "是", "伞": "是", "血迹": "是", "伤口": "否" }
        },
        {
            id: "story_003",
            title: "镜中的第三个人",
            difficulty: "hard",
            type: "black",
            surface: "她每天照镜子，总觉得镜中有第三个人的眼睛在看她。某天，镜子碎了，她尖叫着跑了出去。",
            bottom: "她是双胞胎，但妹妹出生时就死在了她旁边，她潜意识一直觉得有另一个人存在；实际上镜子背后是暗室，邻居男孩通过单向镜偷窥她多年。镜子碎掉那天是因为男孩心脏病发作撞破了镜子。",
            hints: ["镜中是否存在真实的人？", "尖叫的原因是什么？", "关于妹妹的回忆？"],
            keywords: { "双胞胎": "是", "偷窥": "是", "男孩": "是", "镜子背后": "是", "尖叫": "是" }
        },
        {
            id: "story_004",
            title: "消失的咖啡",
            difficulty: "medium",
            type: "clear",
            surface: "一个人每天早上都会喝一杯咖啡，但有一天他发现咖啡消失了，后来他也消失了。",
            bottom: "他是个时间旅行者，每天早上喝的咖啡是他未来自己送来的。那天他未来的自己没有送来咖啡，导致他无法继续存在于当前时间线，最终消失了。",
            hints: ["咖啡与他的存在有关吗？", "他是否有特殊能力？", "未来的自己是否与咖啡有关？"],
            keywords: { "时间旅行": "是", "未来": "是", "咖啡": "是", "消失": "是" }
        },
        {
            id: "story_005",
            title: "午夜的电话",
            difficulty: "hard",
            type: "red",
            surface: "一个人在午夜接到一个电话，电话里传来自己的声音说「我回来了」，然后他就死了。",
            bottom: "他是个精神病患者，曾经在午夜听到自己声音的幻觉。那天晚上，他的幻觉变得异常真实，导致他精神崩溃并自杀了。",
            hints: ["电话里的声音是真实的吗？", "他有精神疾病吗？", "他为什么会自杀？"],
            keywords: { "精神病": "是", "幻觉": "是", "午夜": "是", "电话": "是", "自杀": "是" }
        },
        {
            id: "story_006",
            title: "消失的画家",
            difficulty: "medium",
            type: "black",
            surface: "一位画家在完成一幅自画像后神秘消失了，警方在他的工作室里只发现了这幅画。",
            bottom: "画家患有严重的分离焦虑症，他把自己想象成画中的人物，最终精神崩溃导致他消失了。警方后来在一个废弃的仓库里发现了他的尸体，旁边放着那幅自画像。",
            hints: ["画家是否有心理问题？", "自画像与他的消失有关吗？", "警方后来发现了什么？"],
            keywords: { "心理问题": "是", "分离焦虑": "是", "自画像": "是", "消失": "是", "尸体": "是" }
        },
        {
            id: "story_007",
            title: "消失的钥匙",
            difficulty: "easy",
            type: "clear",
            surface: "一个人每天都把钥匙放在同一个地方，但有一天他发现钥匙不见了，后来他也不见了。",
            bottom: "他是个失忆症患者，每天都把钥匙放在同一个地方来帮助自己记忆。那天他忘记了这个习惯，找不到钥匙导致他无法离开家，最终被困在家里直到被发现时已经去世了。",
            hints: ["钥匙与他的生活习惯有关吗？", "他是否有记忆问题？", "他最后是怎么被发现的？"],
            keywords: { "失忆症": "是", "记忆问题": "是", "钥匙": "是", "消失": "是" }
        },
        {
            id: "story_008",
            title: "消失的影子",
            difficulty: "hard",
            type: "black",
            surface: "一个人发现自己的影子突然消失了，后来他也消失了。",
            bottom: "他是个被诅咒的人，诅咒使他的影子逐渐变淡，最终完全消失。没有影子的人无法在阳光下生存，最终他在一个晴天里暴露在阳光下而死去。",
            hints: ["影子与他的存在有关吗？", "他是否知道自己被诅咒了？", "他最后是怎么死的？"],
            keywords: { "诅咒": "是", "影子": "是", "消失": "是", "阳光": "是", "死亡": "是" }
        },
        {
            id: "story_009",
            title: "消失的声音",
            difficulty: "medium",
            type: "red",
            surface: "一个人突然发现自己无法发出声音了，后来他也消失了。",
            bottom: "他是个哑巴，但他一直在努力学习说话。那天他终于学会了说话，但他的声音太过尖锐刺耳，导致周围的人都无法忍受，最终他被孤立并精神崩溃了。",
            hints: ["他之前能说话吗？", "他的声音有什么特别之处吗？", "他最后是怎么被对待的？"],
            keywords: { "哑巴": "是", "学习说话": "是", "尖锐声音": "是", "孤立": "是", "精神崩溃": "是" }
        }
    ];

    // 全局变量
    let currentStory = null;
    let messages = [];
    let hintsUsed = 0;
    let gameEnded = false;

    // DOM 元素
    const hallView = document.getElementById('hallView');
    const gameView = document.getElementById('gameView');
    const storyListDiv = document.getElementById('storyList');
    const surfaceText = document.getElementById('surfaceText');
    const chatContainer = document.getElementById('chatContainer');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const hintBtn = document.getElementById('hintBtn');
    const viewBottomBtn = document.getElementById('viewBottomBtn');
    const endGameBtn = document.getElementById('endGameBtn');
    const gameEndPanel = document.getElementById('gameEndPanel');

    // ---------- 背景音乐控制 ----------
    const bgMusic = document.getElementById('bgMusic');
    const muteBtn = document.getElementById('muteBtn');
    let isMuted = false;

    function playMusic() {
        if (bgMusic) {
            bgMusic.play().catch(e => console.log("自动播放被阻止，需要用户点击页面"));
        }
    }
    // 用户首次点击页面任意位置时播放音乐
    document.body.addEventListener('click', function initAudio() {
        playMusic();
        document.body.removeEventListener('click', initAudio);
    }, { once: true });

    if (muteBtn) {
        muteBtn.addEventListener('click', () => {
            if (isMuted) {
                bgMusic.volume = 1;
                muteBtn.innerHTML = "🔊 静音";
                isMuted = false;
            } else {
                bgMusic.volume = 0;
                muteBtn.innerHTML = "🔇 取消静音";
                isMuted = true;
            }
        });
    }

    // ---------- 游戏逻辑 ----------
    function renderHall() {
        storyListDiv.innerHTML = '';
        STORIES.forEach(story => {
            const card = document.createElement('div');
            card.className = 'card';
            let diffClass = '';
            if (story.difficulty === 'easy') diffClass = 'difficulty-easy';
            else if (story.difficulty === 'medium') diffClass = 'difficulty-medium';
            else diffClass = 'difficulty-hard';
            let typeEmoji = story.type === 'red' ? '🔪' : (story.type === 'black' ? '🌙' : '☕');
            card.innerHTML = `
                <h3>${story.title} <span class="type-icon">${typeEmoji}</span></h3>
                <div><span class="badge ${diffClass}">${story.difficulty === 'easy' ? '简单' : story.difficulty === 'medium' ? '中等' : '困难'}</span></div>
                <div class="surface-preview">${story.surface.substring(0, 60)}${story.surface.length > 60 ? '…' : ''}</div>
            `;
            card.addEventListener('click', () => startGame(story.id));
            storyListDiv.appendChild(card);
        });
    }

    function startGame(storyId) {
        const story = STORIES.find(s => s.id === storyId);
        if (!story) return;
        currentStory = story;
        messages = [];
        hintsUsed = 0;
        updateHintDisplay();
        gameEnded = false;
        gameEndPanel.classList.add('hidden');
        gameEndPanel.innerHTML = '';
        surfaceText.innerText = story.surface;
        renderChat();
        hallView.classList.add('hidden');
        gameView.classList.remove('hidden');
        questionInput.disabled = false;
        questionInput.value = '';
        questionInput.focus();
        addSystemMessage(`🔍 游戏开始。请提问，我会回答「是」「否」或「无关」。`);
    }

    function renderChat() {
        chatContainer.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user-message' : 'assistant-message'}`;
            div.innerText = msg.content;
            chatContainer.appendChild(div);
        });
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addMessage(role, content) {
        messages.push({ id: Date.now() + Math.random(), role: role, content: content, timestamp: Date.now() });
        renderChat();
    }

    function addSystemMessage(content) {
        addMessage('assistant', content);
    }

    function getAIResponse(question, story) {
        if (!story) return "无关";
        const lowerQuestion = question.toLowerCase();
        for (const [keyword, answer] of Object.entries(story.keywords)) {
            if (lowerQuestion.includes(keyword.toLowerCase())) {
                return answer;
            }
        }
        return "无关";
    }

    function handleQuestion() {
        if (gameEnded) {
            addSystemMessage("游戏已经结束，请点击「结束游戏」返回大厅或重新选择故事。");
            return;
        }
        const question = questionInput.value.trim();
        if (question === "") return;
        addMessage('user', question);
        questionInput.value = '';
        const answer = getAIResponse(question, currentStory);
        addMessage('assistant', answer);
        questionInput.focus();
    }

    function giveHint() {
        if (gameEnded) {
            addSystemMessage("游戏已结束，无法使用提示。");
            return;
        }
        if (!currentStory) return;
        if (hintsUsed >= currentStory.hints.length) {
            addSystemMessage("没有更多提示了，再仔细推理吧。");
            hintBtn.disabled = true;
            return;
        }
        addMessage('assistant', `💡 提示：${currentStory.hints[hintsUsed]}`);
        hintsUsed++;
        updateHintDisplay();
    }

    function updateHintDisplay() {
        const hintSpan = document.getElementById('hintCount');
        if (hintSpan && currentStory) {
            const remaining = currentStory.hints.length - hintsUsed;
            hintSpan.innerText = remaining >= 0 ? remaining : 0;
        }
    }

    function revealBottom(isGuessCorrect = false) {
        if (gameEnded) return;
        gameEnded = true;
        questionInput.disabled = true;
        const totalQuestions = messages.filter(m => m.role === 'user').length;
        let bottomMessage = `🔮 真相大白 · 汤底揭晓：${currentStory.bottom}`;
        if (isGuessCorrect) {
            bottomMessage = `🎉 恭喜你推理成功！\n\n🔮 汤底：${currentStory.bottom}`;
        }
        addMessage('assistant', bottomMessage);
        gameEndPanel.classList.remove('hidden');
        gameEndPanel.innerHTML = `
            <h3>🐢 完整汤底</h3>
            <p style="margin: 1rem 0; line-height:1.5;">${currentStory.bottom}</p>
            <p>📊 游戏统计：你共提问 <strong>${totalQuestions}</strong> 次。</p>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
                <button id="playAgainBtn" style="background:#d4af37; color:#0a0f2a; padding: 10px 20px;">🍲 再来一局</button>
            </div>
        `;
        const playAgain = document.getElementById('playAgainBtn');
        if (playAgain) playAgain.addEventListener('click', () => backToHall());
    }

    function backToHall() {
        hallView.classList.remove('hidden');
        gameView.classList.add('hidden');
        currentStory = null;
        messages = [];
        gameEnded = false;
        questionInput.disabled = false;
        renderHall();
    }

    // 绑定事件
    sendBtn.addEventListener('click', handleQuestion);
    questionInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleQuestion(); });
    hintBtn.addEventListener('click', giveHint);
    viewBottomBtn.addEventListener('click', () => revealBottom(false));
    endGameBtn.addEventListener('click', backToHall);

    const guessBtn = document.getElementById('guessBtn');
    if (guessBtn) {
        guessBtn.addEventListener('click', () => {
            if (gameEnded) {
                addSystemMessage("游戏已经结束。");
                return;
            }
            const userConfirmed = confirm("你真的推理出完整真相了吗？点击确定将揭晓汤底并统计结果。");
            if (userConfirmed) {
                revealBottom(true);
            }
        });
    }

    // 初始化游戏大厅
    renderHall();
</script>
</body>
</html>
